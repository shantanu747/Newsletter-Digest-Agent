# ============================================================
# Newsletter Digest Agent — Configuration
# Non-secret settings only. Secrets go in .env
# ============================================================

# How often to poll Gmail (in hours)
poll_interval_hours: 4

# Max emails per digest batch
batch_size: 10

# Hard cap on newsletters processed per run to avoid runaway API usage (default: 20)
max_newsletters_per_run: 20

# Target word count for each AI-generated summary (default: 225)
summary_word_target: 225

# Summary length mode: "fixed" uses summary_word_target; "percentage" scales by source length
summary_length_mode: "percentage"  # "fixed" | "percentage"
summary_percentage: 18             # % of source word count (used when mode=percentage)
summary_min_words: 100             # floor for percentage mode
summary_max_words: 500             # ceiling for percentage mode

# Per-sender rules — replaces the old flat sender list
# mode: "summarize" (default) | "pass_through" (preserve content, skip AI)
senders:
  - address: "newsletter@morningbrew.com"
    display_name: "Morning Brew"
    mode: summarize

  - address: "digest@tldr.tech"
    display_name: "TLDR"
    mode: summarize

  - address: "hello@stratechery.com"
    display_name: "Stratechery"
    mode: summarize


# Subject line keywords — include any email whose subject contains one of these
# (case-insensitive substring match)
subject_keywords:
  - "daily digest"
  - "weekly roundup"
  - "newsletter"

# Scheduler settings (used by: python -m agent.scheduler)
schedule:
  timezone: "America/Los_Angeles"
